<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Craft AI | Professional Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .teacher-card:hover { transform: translateY(-10px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Top Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4 border-b">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-700">Career<span class="text-orange-500">Craft</span></h1>
            <div class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-semibold">BETA v1.0</div>
        </div>
    </nav>

    <!-- Welcome Section -->
    <header class="max-w-6xl mx-auto p-6 mt-4 text-center">
        <h2 class="text-3xl font-bold text-slate-800">Namaste! Aap kya padhna chahte hain?</h2>
        <p class="text-slate-500 mt-2">Apne pasandida teacher se sawaal poochein</p>
    </header>

    <!-- Professional Grid -->
    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Maths Card -->
        <div class="teacher-card bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <div class="h-32 bg-blue-600 flex items-end justify-center">
                <img src="math_teacher.jpg" class="w-24 h-24 rounded-2xl border-4 border-white shadow-lg translate-y-8 object-cover">
            </div>
            <div class="p-8 pt-12 text-center">
                <h3 class="text-xl font-bold text-slate-800">Mathematics</h3>
                <p class="text-blue-600 font-medium">Arya Sir</p>
                <p class="text-slate-400 text-sm mt-2">Expert in Algebra & Calculus</p>
                <button onclick="openChat('Mathematics', 'Arya Sir')" class="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 transition-colors">Start Learning</button>
            </div>
        </div>

        <!-- Science Card -->
        <div class="teacher-card bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <div class="h-32 bg-green-600 flex items-end justify-center">
                <img src="science_teacher.jpg" class="w-24 h-24 rounded-2xl border-4 border-white shadow-lg translate-y-8 object-cover">
            </div>
            <div class="p-8 pt-12 text-center">
                <h3 class="text-xl font-bold text-slate-800">Science</h3>
                <p class="text-green-600 font-medium">Dr. Vigyan</p>
                <p class="text-slate-400 text-sm mt-2">Physics & Biology Specialist</p>
                <button onclick="openChat('Science', 'Dr. Vigyan')" class="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-green-600 transition-colors">Start Learning</button>
            </div>
        </div>

        <!-- English Card -->
        <div class="teacher-card bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <div class="h-32 bg-purple-600 flex items-end justify-center">
                <img src="english_teacher.jpg" class="w-24 h-24 rounded-2xl border-4 border-white shadow-lg translate-y-8 object-cover">
            </div>
            <div class="p-8 pt-12 text-center">
                <h3 class="text-xl font-bold text-slate-800">English</h3>
                <p class="text-purple-600 font-medium">Ms. Sofia</p>
                <p class="text-slate-400 text-sm mt-2">Grammar & Communication</p>
                <button onclick="openChat('English', 'Ms. Sofia')" class="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-purple-600 transition-colors">Start Learning</button>
            </div>
        </div>

    </main>

    <!-- Footer Status -->
    <footer class="text-center p-10 text-slate-400 text-sm">
        Built with ❤️ in India | Powered by Gemini AI
    </footer>

    <script>
        const API_KEY = "AIzaSyA0Yn8FcwsiIGcJn3ULuxvF21BA4eel4jQ";

        async function openChat(subject, teacher) {
            const userQ = prompt(`[${teacher}] Namaste! Main aapka ${subject} tutor hoon. Aapka sawal kya hai?`);
            
            if (!userQ) return;

            // Loading Alert (Professional)
            alert(`${teacher} aapka jawab taiyar kar rahe hain...`);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are ${teacher}, an expert ${subject} teacher from India. Answer this student's question clearly in Hinglish: ${userQ}` }] }]
                    })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                // Show Answer in a clean way
                alert(`--- Message from ${teacher} ---\n\n${reply}`);
            } catch (e) {
                alert("Internet check karein ya API Key ki limit dekhein.");
            }
        }
    </script>
</body>
</html>
